<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لمبة صلي على محمد - بالحبل</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Arial', sans-serif;
            transition: background 0.5s ease;
        }

        body.light {
            background: linear-gradient(145deg, #f5f5f5 0%, #e0e0e0 100%);
        }

        .container {
            text-align: center;
            padding: 2rem;
            position: relative;
        }

        .lamp-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
        }

        .rope {
            width: 4px;
            height: 80px;
            background: linear-gradient(to bottom, #8b6b4d, #5d3f2b);
            margin-bottom: -5px;
            position: relative;
            z-index: 5;
            cursor: pointer;
            transition: height 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .rope::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -8px;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, #c0a080, #8b6b4d);
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .rope::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: -3px;
            width: 10px;
            height: 10px;
            background: #8b6b4d;
            border-radius: 50%;
        }

        .rope.pulled {
            height: 100px;
            transform: translateY(-10px);
        }

        .rope.pulled::before {
            transform: translateY(-5px);
        }

        .lamp-container {
            position: relative;
            width: 280px;
            cursor: pointer;
            transition: transform 0.3s ease;
            z-index: 10;
        }

        .lamp-container:hover {
            transform: scale(1.02);
        }

        .lamp-base {
            width: 90px;
            height: 55px;
            background: linear-gradient(145deg, #777, #444);
            margin: 0 auto;
            border-radius: 50% 50% 20px 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            position: relative;
            z-index: 2;
        }

        .lamp-base::before {
            content: '';
            position: absolute;
            width: 130px;
            height: 18px;
            background: linear-gradient(145deg, #888, #555);
            top: -8px;
            left: -20px;
            border-radius: 10px;
        }

        .lamp-base::after {
            content: '';
            position: absolute;
            width: 25px;
            height: 35px;
            background: linear-gradient(145deg, #666, #333);
            top: -35px;
            left: 32px;
            border-radius: 5px;
        }

        .lamp-body {
            position: relative;
            width: 200px;
            height: 240px;
            margin: -15px auto 0;
        }

        .lamp-glass {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 30%, #aaa, #666);
            border-radius: 50% 50% 40% 40% / 60% 60% 40% 40%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3),
                        inset 0 -10px 20px rgba(0,0,0,0.3),
                        inset 0 10px 20px rgba(255,255,255,0.3);
            position: relative;
            overflow: hidden;
            transition: all 0.5s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            border: 2px solid rgba(100,100,100,0.3);
        }

        .lamp-text {
            font-size: 26px;
            font-weight: bold;
            color: #444;
            text-shadow: 0 2px 5px rgba(255,255,255,0.3);
            padding: 20px;
            line-height: 1.6;
            transition: all 0.5s ease;
            font-family: 'Arial', sans-serif;
            position: relative;
            z-index: 3;
            background: rgba(0,0,0,0.1);
            border-radius: 15px;
            backdrop-filter: blur(2px);
        }

        .lamp-text.off-text {
            color: #333;
            font-size: 28px;
            letter-spacing: 2px;
        }

        .lamp-text.on-text {
            color: #8B4513;
            font-size: 24px;
            font-weight: bold;
            background: rgba(255,215,0,0.2);
            text-shadow: 0 0 10px #ffd700;
        }

        .lamp.light-on .lamp-glass {
            background: radial-gradient(circle at 30% 30%, #fff9e6, #ffcc00);
            box-shadow: 0 10px 40px rgba(255,215,0,0.8),
                        inset 0 -10px 20px rgba(0,0,0,0.2),
                        inset 0 10px 30px rgba(255,255,255,0.9);
            border-color: rgba(255,215,0,0.8);
        }

        .light-rays {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(255,215,0,0.3) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        .lamp.light-on + .light-rays {
            opacity: 1;
        }

        .rope-connector {
            width: 30px;
            height: 20px;
            background: linear-gradient(145deg, #b0916e, #6b4f35);
            border-radius: 5px 5px 0 0;
            margin-top: -2px;
            box-shadow: 0 -2px 5px rgba(0,0,0,0.2);
            z-index: 4;
        }

        .count {
            margin-top: 3rem;
            font-size: 18px;
            color: #fff;
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 30px;
            display: inline-block;
            backdrop-filter: blur(5px);
            transition: color 0.5s ease;
            border: 1px solid rgba(255,255,255,0.2);
            cursor: default;
        }

        body.light .count {
            color: #333;
            background: rgba(0,0,0,0.1);
            border: 1px solid rgba(0,0,0,0.1);
        }

        .instructions {
            margin-top: 2rem;
            color: #aaa;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .instruction-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.1);
            padding: 8px 15px;
            border-radius: 30px;
        }

        body.light .instructions {
            color: #666;
        }

        body.light .instruction-item {
            background: rgba(0,0,0,0.05);
        }

        @media (max-width: 480px) {
            .lamp-container {
                width: 240px;
            }
            
            .lamp-body {
                width: 180px;
                height: 210px;
            }
            
            .lamp-text {
                font-size: 22px;
            }
            
            .lamp-text.off-text {
                font-size: 24px;
            }
            
            .lamp-text.on-text {
                font-size: 20px;
            }
            
            .rope {
                height: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="color: #fff; margin-bottom: 1rem; text-shadow: 0 2px 5px rgba(0,0,0,0.5); transition: color 0.5s ease;">
            💡 لمبة الصلاة على النبي 💡
        </h1>
        
        <div class="lamp-wrapper">
            <div class="rope" id="rope"></div>
            <div class="rope-connector"></div>
            
            <div class="lamp-container">
                <div class="lamp" id="lamp">
                    <div class="lamp-base"></div>
                    <div class="lamp-body" id="lampBody">
                        <div class="lamp-glass" id="lampGlass">
                            <div class="lamp-text off-text" id="lampText">
                                تشغيل
                            </div>
                        </div>
                    </div>
                </div>
                <div class="light-rays" id="lightRays"></div>
            </div>
        </div>

        <div class="count" id="countDisplay">
            عدد مرات التشغيل: 0
        </div>

        <div class="instructions">
            <div class="instruction-item">
                <span>👇</span> اسحب الحبل للتشغيل
            </div>
            <div class="instruction-item">
                <span>💡</span> اضغط على اللمبة للإطفاء
            </div>
        </div>
    </div>

    <script>
        let isOn = false;
        let clickCount = 0;

        const lamp = document.getElementById('lamp');
        const lampBody = document.getElementById('lampBody');
        const lampGlass = document.getElementById('lampGlass');
        const lampText = document.getElementById('lampText');
        const lightRays = document.getElementById('lightRays');
        const rope = document.getElementById('rope');
        const countDisplay = document.getElementById('countDisplay');
        const body = document.body;

        function turnOn() {
            if (!isOn) {
                isOn = true;
                lamp.classList.add('light-on');
                body.classList.add('light');
                lampText.classList.remove('off-text');
                lampText.classList.add('on-text');
                lampText.innerHTML = 'صلي<br>على<br>محمد';
                clickCount++;
                countDisplay.innerHTML = `عدد مرات التشغيل: ${clickCount}`;
                lampText.style.transform = 'scale(1.05)';
                setTimeout(() => {
                    lampText.style.transform = 'scale(1)';
                }, 200);
                saveState();
            }
        }

        function turnOff() {
            if (isOn) {
                isOn = false;
                lamp.classList.remove('light-on');
                body.classList.remove('light');
                lampText.classList.remove('on-text');
                lampText.classList.add('off-text');
                lampText.innerHTML = 'تشغيل';
                saveState();
            }
        }

        rope.addEventListener('mousedown', function(e) {
            this.classList.add('pulled');
            turnOn();
            setTimeout(() => {
                this.classList.remove('pulled');
            }, 300);
        });

        // دعم اللمس للجوال
        rope.addEventListener('touchstart', function(e) {
            e.preventDefault();
            this.classList.add('pulled');
            turnOn();
            setTimeout(() => {
                this.classList.remove('pulled');
            }, 300);
        });

        lampBody.addEventListener('click', function(e) {
            e.stopPropagation();
            turnOff();
            this.style.transform = 'scale(0.98)';
            setTimeout(() => {
                this.style.transform = 'scale(1)';
            }, 150);
        });

        rope.addEventListener('mouseenter', function() {
            if (!isOn) {
                this.style.height = '85px';
            }
        });

        rope.addEventListener('mouseleave', function() {
            this.style.height = '80px';
            this.classList.remove('pulled');
        });

        function saveState() {
            localStorage.setItem('lampState', isOn);
            localStorage.setItem('clickCount', clickCount);
        }

        function loadState() {
            const savedState = localStorage.getItem('lampState');
            const savedCount = localStorage.getItem('clickCount');
            
            if (savedState !== null) {
                isOn = savedState === 'true';
                if (isOn) {
                    lamp.classList.add('light-on');
                    body.classList.add('light');
                    lampText.classList.remove('off-text');
                    lampText.classList.add('on-text');
                    lampText.innerHTML = 'صلي<br>على<br>محمد';
                } else {
                    lampText.innerHTML = 'تشغيل';
                }
            }
            
            if (savedCount !== null) {
                clickCount = parseInt(savedCount);
                countDisplay.innerHTML = `عدد مرات التشغيل: ${clickCount}`;
            }
        }

        loadState();
        window.addEventListener('beforeunload', saveState);

        function resetCounter() {
            if (confirm('هل تريد إعادة تعيين العداد؟')) {
                clickCount = 0;
                countDisplay.innerHTML = `عدد مرات التشغيل: 0`;
                saveState();
            }
        }

        countDisplay.addEventListener('dblclick', resetCounter);

        console.log('مرحباً بك في لمبة الصلاة على النبي - نسخة الحبل!');
    </script>
</body>
</html>
